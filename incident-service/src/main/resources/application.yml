server:
  port: 8080


spring:
  application:
    name: incident-service

  datasource:
    url: jdbc:h2:mem:incidentdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect
